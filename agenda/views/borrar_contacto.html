<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Borrar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4">
      <h2>Borrar Contacto</h2>
      <p class="text-danger">¿De verdad quieres eliminar este registro?</p>
      
      <form action="/borrar_contacto" method="POST">
        <div class="mb-3">
          <label class="form-label">ID</label>
          <input type="text" name="id" class="form-control" value="1" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Nombre Completo</label>
          <input type="text" class="form-control" value="Alex Gayosso Maldonado" readonly>
        </div>
        
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="/lista_contactos" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
  </body>
</html>
