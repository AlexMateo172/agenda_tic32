$def with(contacto)

<h1>Borrar Contacto</h1>

<p>¿Estás seguro de que deseas eliminar permanentemente a <strong>$contacto['nombre'] $contacto['primer_apellido']</strong>?</p>

<form method="POST">
  <label for="id_contacto">ID Contacto:</label>
  <input type="text" id="id_contacto" name="id_contacto" value="$contacto['id_contacto']" disabled><br><br>

  <label for="nombre">Nombre:</label>
  <input type="text" id="nombre" name="nombre" value="$contacto['nombre']" disabled><br><br>

  <label for="primer_apellido">Primer Apellido:</label>
  <input type="text" id="primer_apellido" name="primer_apellido" value="$contacto['primer_apellido']" disabled><br><br>

  <label for="segundo_apellido">Segundo Apellido:</label>
  <input type="text" id="segundo_apellido" name="segundo_apellido" value="$contacto['segundo_apellido']" disabled><br><br>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" value="$contacto['email']" disabled><br><br>

  <label for="telefono">Teléfono:</label>
  <input type="tel" id="telefono" name="telefono" value="$contacto['telefono']" disabled><br><br>

  <!-- Botón tipo submit para enviar la confirmación de borrado por POST -->
  <button type="submit" style="color: white; background-color: red;">Sí, Borrar Contacto</button>
  <a href="/lista_contactos"><button type="button">Cancelar</button></a>
</form>
