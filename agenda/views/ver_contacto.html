<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ver Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4">
      <h2>Detalles del Contacto</h2>
      
      <form>
        <div class="mb-3">
          <label class="form-label">ID</label>
          <input type="text" class="form-control" value="1" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" value="Alex" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Primer Apellido</label>
          <input type="text" class="form-control" value="Gayosso" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Segundo Apellido</label>
          <input type="text" class="form-control" value="Maldonado" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input type="text" class="form-control" value="7751234567" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" value="alex@gmail.com" readonly>
        </div>
        
        <a href="/lista_contactos" class="btn btn-secondary">Regresar</a>
      </form>
    </div>
  </body>
</html>
