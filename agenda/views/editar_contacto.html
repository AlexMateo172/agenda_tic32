<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4">
      <h2>Editar Contacto</h2>
      
      <form action="/editar_contacto" method="POST">
        <div class="mb-3">
          <label class="form-label">ID</label>
          <input type="text" name="id" class="form-control" value="1" readonly>
        </div>
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" name="nombre" class="form-control" value="Alex">
        </div>
        <div class="mb-3">
          <label class="form-label">Primer Apellido</label>
          <input type="text" name="primer_apellido" class="form-control" value="Gayosso">
        </div>
        <div class="mb-3">
          <label class="form-label">Segundo Apellido</label>
          <input type="text" name="segundo_apellido" class="form-control" value="Maldonado">
        </div>
        <div class="mb-3">
          <label class="form-label">Teléfono</label>
          <input type="text" name="telefono" class="form-control" value="7751234567">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="alex@gmail.com">
        </div>
        
        <button type="submit" class="btn btn-warning">Guardar Cambios</button>
        <a href="/lista_contactos" class="btn btn-secondary">Cancelar</a>
      </form>
    </div>
  </body>
</html>
